<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Login - Casa Capital</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #0f172a;
      }
      .card {
        background: #ffffff;
        padding: 2.5rem 2.75rem;
        border-radius: 16px;
        box-shadow:
          0 20px 40px rgba(15, 23, 42, 0.35),
          0 0 0 1px rgba(148, 163, 184, 0.25);
        width: 100%;
        max-width: 420px;
      }
      h1 {
        margin: 0 0 0.5rem 0;
        font-size: 1.6rem;
        color: #0f172a;
      }
      p.subtitle {
        margin: 0 0 1.75rem 0;
        font-size: 0.95rem;
        color: #6b7280;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        color: #4b5563;
        margin-bottom: 0.35rem;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 0.55rem 0.7rem;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 0.95rem;
        outline: none;
        box-sizing: border-box;
      }
      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
      }
      .field {
        margin-bottom: 1rem;
      }
      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #b91c1c;
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        font-size: 0.85rem;
        margin-bottom: 1rem;
      }
      button {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border-radius: 999px;
        border: none;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #ffffff;
        box-shadow: 0 12px 20px rgba(37, 99, 235, 0.35);
      }
      button:hover {
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
      }
      .footer {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: #9ca3af;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Casa Capital</h1>
      <p class="subtitle">Sign in to view underwriting deals.</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('login') }}">
        <div class="field">
          <label for="username">Email</label>
          <input
            type="email"
            id="username"
            name="username"
            value="{{ username or '' }}"
            autocomplete="username"
            required
          />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit">Sign in</button>
      </form>

      <div class="footer">
        Internal access only · Casa Capital
      </div>
    </div>
  </body>
  </html>
